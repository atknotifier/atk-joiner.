<script>
// Stars - FIXED (was broken with "se.appendChild")
const starsContainer = document.getElementById('stars');
for(let i=0;i<120;i++){
  const s=document.createElement('div');
  s.className='star';
  const sz=Math.random()*2.5+0.5;
  s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--dur:${2+Math.random()*4}s;--delay:${Math.random()*4}s;--op:${0.3+Math.random()*0.6}`;
  starsContainer.appendChild(s);
}

// State - Now properly persists
let balance = parseFloat(localStorage.getItem("balance")) || 0;
let loggedIn = localStorage.getItem("loggedIn") === "true";
let username = localStorage.getItem("username") || "";
let userId = localStorage.getItem("userId") || "";

let transactions = JSON.parse(localStorage.getItem("transactions")) || [];
let customers = JSON.parse(localStorage.getItem("customers")) || [];
let farmerSlots = JSON.parse(localStorage.getItem("farmerSlots")) || [];
let diamondSlots = JSON.parse(localStorage.getItem("diamondSlots")) || [];
let activeKey = JSON.parse(localStorage.getItem("activeKey")) || null;

const FM = 4;
const DM = 6;

const WALLETS={
  'LTC':'Lg35HX4qi452guwwkMDLZMnp41ViJvhkoH',
  'SOL':'YOUR_SOL_WALLET_HERE',
  'USDT TRC20':'YOUR_USDT_TRC20_WALLET_HERE',
  'ETH':'YOUR_ETH_WALLET_HERE',
  'BTC':'YOUR_BTC_WALLET_HERE'
};

function saveState() {
  localStorage.setItem("loggedIn", loggedIn);
  localStorage.setItem("username", username);
  localStorage.setItem("userId", userId);
  localStorage.setItem("balance", balance);
  localStorage.setItem("transactions", JSON.stringify(transactions));
  localStorage.setItem("customers", JSON.stringify(customers));
  localStorage.setItem("farmerSlots", JSON.stringify(farmerSlots));
  localStorage.setItem("diamondSlots", JSON.stringify(diamondSlots));
  localStorage.setItem("activeKey", JSON.stringify(activeKey));
}

function updateUI(){
  document.getElementById('navLoginBtn').style.display=loggedIn?'none':'';
  document.getElementById('navUser').style.display=loggedIn?'flex':'none';
  document.getElementById('navLogout').style.display=loggedIn?'':'none';
  document.getElementById('navBalance').style.display=loggedIn?'':'none';
  document.getElementById('navUsername').textContent=username || "User";
  document.getElementById('navBalance').textContent='$'+balance.toFixed(2);
  document.getElementById('pName').textContent=username||'—';
  document.getElementById('pId').textContent=userId||'Not logged in';
  document.getElementById('pBalance').textContent='$'+balance.toFixed(2);
}

function showPage(p){
  if((p==='buy'||p==='profile')&&!loggedIn){
    document.getElementById('loginOverlay').classList.add('open');
    return;
  }
  document.getElementById('home-page').style.display=p==='home'?'flex':'none';
  ['buy','customers','profile'].forEach(x=>document.getElementById(x+'-page').classList.toggle('active',x===p));
  ['home','buy','customers','profile'].forEach(x=>{const el=document.getElementById('nav-'+x);if(el)el.classList.toggle('active',x===p);});
}

// FIXED: Purchase button now works properly
function goToPurchase(){
  if(!loggedIn){
    document.getElementById('loginOverlay').classList.add('open');
  } else {
    showPage('buy');
  }
}

function doDiscordLogin(){
  window.location.href = "https://discord.com/oauth2/authorize?client_id=1487896823350951947&response_type=code&redirect_uri=https%3A%2F%2Fatknotifier.netlify.app%2Fcallback&scope=identify%20email";
}

// Simulate login after callback (for testing)
if (window.location.search.includes('code=') || window.location.pathname.includes('callback')) {
  setTimeout(() => {
    loggedIn = true;
    username = "cute eboy";
    userId = "123456789";
    saveState();
    updateUI();
    document.getElementById('loginOverlay').classList.remove('open');
    showToast('✅ Logged in as ' + username);
    showPage('buy');
  }, 800);
}

function logout(){
  if(confirm("Logout?")) {
    localStorage.clear();
    location.reload();
  }
}

// Keep ALL your original functions below (only added saveState where needed)
let secs=17*60+28;
setInterval(()=>{const m=String(Math.floor(secs/60)).padStart(2,'0'),s=String(secs%60).padStart(2,'0');document.getElementById('countdown').textContent=m+':'+s;if(secs>0)secs--;},1000);

document.getElementById('fSlider').addEventListener('input',function(){document.getElementById('fCost').textContent=this.value+'h – $'+(this.value*4).toFixed(2);});
document.getElementById('dSlider').addEventListener('input',function(){document.getElementById('dCost').textContent=this.value+'h – $'+(this.value*10).toFixed(2);});

function switchTab(t){
  document.getElementById('cryptoTab').style.display=t==='crypto'?'block':'none';
  document.getElementById('giftTab').style.display=t==='gift'?'block':'none';
  document.getElementById('tabCrypto').classList.toggle('active',t==='crypto');
  document.getElementById('tabGift').classList.toggle('active',t==='gift');
}

function openCryptoModal(){
  if(!loggedIn){document.getElementById('loginOverlay').classList.add('open');return;}
  const coin=document.getElementById('coinSelect').value;
  const addr=WALLETS[coin]||'Contact support for this coin address';
  document.getElementById('modalCoinBadge').textContent='🪙 '+coin;
  document.getElementById('mCoin').textContent=coin;
  document.getElementById('mCoin2').textContent=coin;
  document.getElementById('modalAddr').textContent=addr;
  document.getElementById('cryptoModal').classList.add('open');
}
function closeCryptoModal(){document.getElementById('cryptoModal').classList.remove('open');}
document.getElementById('cryptoModal').addEventListener('click',function(e){if(e.target===this)closeCryptoModal();});

function copyAddr(){
  const addr=document.getElementById('modalAddr').textContent;
  if(navigator.clipboard){navigator.clipboard.writeText(addr).then(()=>showToast('📋 Address copied!'));}
  else{const el=document.createElement('textarea');el.value=addr;document.body.appendChild(el);el.select();document.execCommand('copy');document.body.removeChild(el);showToast('📋 Address copied!');}
}

function redeemGift(){
  const code=document.getElementById('giftCode').value.trim();
  if(!code){showToast('Enter a gift card code');return;}
  if(code.toUpperCase().startsWith('ATK')){
    balance+=10;addTx('Deposit','Gift Card',10,true);
    document.getElementById('giftCode').value='';
    saveState();
    updateUI();
    showToast('✅ Gift card redeemed! +$10.00');
  } else {showToast('❌ Invalid gift card code');}
}

function buySlot(plan,rate){
  if(!loggedIn){document.getElementById('loginOverlay').classList.add('open');return;}
  const slider=plan==='Farmer'?document.getElementById('fSlider'):document.getElementById('dSlider');
  const hrs=parseInt(slider.value),cost=hrs*rate;
  const slots=plan==='Farmer'?farmerSlots:diamondSlots;
  const max=plan==='Farmer'?FM:DM;
  if(balance<cost){showToast('❌ Insufficient balance — deposit first!');setTimeout(()=>showPage('profile'),1000);return;}
  if(slots.length>=max){showToast('❌ All slots full!');return;}
  balance-=cost;
  slots.push({user:username,hrs});
  customers.push({user:username,plan,hours:hrs});
  const key='ATK-'+plan[0]+'-'+Math.random().toString(36).substring(2,10).toUpperCase();
  activeKey={plan,key};
  addTx('Purchase',plan,cost,false);
  saveState();                    // ← Added
  updateUI();renderSlots();renderCustomers();updateKey();
  showToast('✅ '+plan+' slot purchased! '+hrs+'h for $'+cost.toFixed(2));
}

function renderSlots(){
  const fi=document.getElementById('fSlots');
  fi.innerHTML=Array.from({length:FM},(_,i)=>{const s=farmerSlots[i];return s?`<div class="slot-row"><span>Slot ${i+1}</span><span class="slot-user">${s.user}</span><span style="font-size:12px;color:var(--green)">${s.hrs}h</span></div>`:`<div class="slot-row"><span>Slot ${i+1}</span><span class="slot-empty">— empty —</span></div>`;}).join('');
  document.getElementById('fBadge').textContent=farmerSlots.length+'/'+FM;
  document.getElementById('fAvail').textContent=(FM-farmerSlots.length)+'/'+FM;
  document.getElementById('fBar').style.width=((FM-farmerSlots.length)/FM*100)+'%';
  const di=document.getElementById('dSlots');
  di.innerHTML=Array.from({length:DM},(_,i)=>{const s=diamondSlots[i];return s?`<div class="slot-row"><span>Slot ${i+1}</span><span class="slot-user">${s.user}</span><span style="font-size:12px;color:var(--purple-light)">${s.hrs}h</span></div>`:`<div class="slot-row"><span>Slot ${i+1}</span><span class="slot-empty">— empty —</span></div>`;}).join('');
  document.getElementById('dBadge').textContent=diamondSlots.length+'/'+DM;
  document.getElementById('dAvail').textContent=(DM-diamondSlots.length)+'/'+DM;
  document.getElementById('dBar').style.width=((DM-diamondSlots.length)/DM*100)+'%';
}

function updateKey(){
  if(activeKey){
    document.getElementById('keyPlan').textContent=activeKey.plan;
    document.getElementById('keyDot').style.background='var(--green)';
    document.getElementById('keyStatus').textContent='Active';
    document.getElementById('keyStatus').className='key-status active';
    document.getElementById('keyValWrap').style.display='block';
    document.getElementById('keyVal').textContent=activeKey.key;
    document.getElementById('keyEmpty').style.display='none';
  } else {
    document.getElementById('keyPlan').textContent='—';
    document.getElementById('keyDot').style.background='var(--muted)';
    document.getElementById('keyStatus').textContent='Expired';
    document.getElementById('keyStatus').className='key-status expired';
    document.getElementById('keyValWrap').style.display='none';
    document.getElementById('keyEmpty').style.display='block';
  }
}

function placeBid(){
  if(!loggedIn){document.getElementById('loginOverlay').classList.add('open');return;}
  const amt=parseFloat(document.getElementById('bidAmt').value)||0;
  if(amt<350){showToast('Min bid is $350/hr');return;}
  if(balance<22){showToast('❌ Need $22 balance to bid');setTimeout(()=>showPage('profile'),1000);return;}
  showToast('✅ Bid of $'+amt+'/hr placed!');
}

function addTx(type,sub,amount,positive){
  transactions.unshift({type,sub,amount,positive});
  saveState();                    // ← Added
  renderTx();
}

function renderTx(){
  const el=document.getElementById('txList');
  if(!transactions.length){el.innerHTML='<div class="tx-empty">No transactions yet.</div>';return;}
  el.innerHTML=transactions.map(t=>`<div class="tx-row"><div class="tx-left"><div class="tx-type ${t.positive?'deposit':'purchase'}">${t.type}</div><div class="tx-sub">${t.sub}</div></div><div class="tx-right"><div class="tx-amount ${t.positive?'positive':'negative'}">${t.positive?'+':'-'}$${t.amount.toFixed(2)}</div><div class="tx-badge">finished</div></div></div>`).join('');
}

function renderCustomers(){
  const tb=document.getElementById('custBody');
  if(!customers.length){tb.innerHTML='<tr><td colspan="4" style="color:var(--muted);text-align:center;padding:40px">No customers yet.</td></tr>';return;}
  tb.innerHTML=customers.map(c=>`<tr><td>${c.user}</td><td><span class="badge-plan badge-${c.plan.toLowerCase()}">${c.plan}</span></td><td>${c.hours}h</td><td style="color:var(--green)">● Active</td></tr>`).join('');
}

function showToast(msg){const t=document.getElementById('toast');if(!t){const nt=document.createElement('div');nt.id='toast';nt.className='toast';document.body.appendChild(nt);} 
  const toastEl = document.getElementById('toast'); toastEl.textContent=msg; toastEl.classList.add('show'); setTimeout(()=>toastEl.classList.remove('show'),3000);}

updateUI();
renderSlots();
renderCustomers();
updateKey();
showPage('home');
</script>
