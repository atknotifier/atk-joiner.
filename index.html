<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATK Notifier</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  /* Your existing CSS stays exactly the same - no changes needed here */
  :root {
    --bg:#080810;--card-bg:#0f0f1a;--border:#1e1e2e;--purple:#7c3aed;--purple-light:#9f5dff;
    --green:#22c55e;--gold:#f59e0b;--text:#ffffff;--muted:#6b7280;--red:#ef4444;
  }
  /* ... (all your CSS from the original file) ... */
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<!-- LOGIN OVERLAY (unchanged) -->
<div class="overlay" id="loginOverlay">
  <div class="login-box">
    <h2>Welcome to ATK Notifier</h2>
    <p>Sign in with Discord to purchase slots and manage your account.</p>
    <button class="discord-login-btn" onclick="doDiscordLogin()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515..."/></svg>
      Login with Discord
    </button>
    <button class="btn-cancel" onclick="document.getElementById('loginOverlay').classList.remove('open')">Cancel</button>
  </div>
</div>

<!-- CRYPTO MODAL (unchanged) -->
<!-- ... your crypto modal code ... -->

<!-- NAV (unchanged) -->
<nav>
  <!-- ... your nav code ... -->
</nav>

<!-- HOME PAGE (updated Purchase button) -->
<section class="hero" id="home-page">
  <div class="badge">Newly Released</div>
  <h1>ATK Notifier</h1>
  <p class="tagline">Where Profit Begins</p>
  <div class="hero-btns">
    <button class="btn-primary" onclick="goToPurchase()">Purchase</button>
    <button class="btn-discord" onclick="window.open('https://discord.gg/atkjoiner','_blank')">
      Join Discord
    </button>
  </div>
</section>

<!-- BUY, CUSTOMERS, PROFILE pages remain the same -->

<script>
// Stars background (fixed typo: se → document.getElementById('stars'))
const starsContainer = document.getElementById('stars');
for(let i = 0; i < 120; i++){
  const s = document.createElement('div');
  s.className = 'star';
  const sz = Math.random() * 2.5 + 0.5;
  s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--dur:${2+Math.random()*4}s;--delay:${Math.random()*4}s;--op:${0.3+Math.random()*0.6}`;
  starsContainer.appendChild(s);
}

// State Management
let balance = parseFloat(localStorage.getItem("balance")) || 0;
let loggedIn = localStorage.getItem("loggedIn") === "true";
let username = localStorage.getItem("username") || "";
let userId = localStorage.getItem("userId") || "";
let transactions = JSON.parse(localStorage.getItem("transactions")) || [];
let customers = JSON.parse(localStorage.getItem("customers")) || [];
let farmerSlots = JSON.parse(localStorage.getItem("farmerSlots")) || [];
let diamondSlots = JSON.parse(localStorage.getItem("diamondSlots")) || [];
let activeKey = JSON.parse(localStorage.getItem("activeKey")) || null;

const FM = 4;
const DM = 6;

const WALLETS = {
  'LTC': 'Lg35HX4qi452guwwkMDLZMnp41ViJvhkoH',
  'SOL': 'YOUR_SOL_WALLET_HERE',
  'USDT TRC20': 'YOUR_USDT_TRC20_WALLET_HERE',
  'ETH': 'YOUR_ETH_WALLET_HERE',
  'BTC': 'YOUR_BTC_WALLET_HERE'
};

function saveState() {
  localStorage.setItem("loggedIn", loggedIn);
  localStorage.setItem("username", username);
  localStorage.setItem("userId", userId);
  localStorage.setItem("balance", balance);
  localStorage.setItem("transactions", JSON.stringify(transactions));
  localStorage.setItem("customers", JSON.stringify(customers));
  localStorage.setItem("farmerSlots", JSON.stringify(farmerSlots));
  localStorage.setItem("diamondSlots", JSON.stringify(diamondSlots));
  localStorage.setItem("activeKey", JSON.stringify(activeKey));
}

function updateUI() {
  document.getElementById('navLoginBtn').style.display = loggedIn ? 'none' : '';
  document.getElementById('navUser').style.display = loggedIn ? 'flex' : 'none';
  document.getElementById('navLogout').style.display = loggedIn ? '' : 'none';
  document.getElementById('navBalance').style.display = loggedIn ? '' : 'none';
  
  document.getElementById('navUsername').textContent = username || "User";
  document.getElementById('navBalance').textContent = '$' + balance.toFixed(2);
  document.getElementById('pName').textContent = username || '—';
  document.getElementById('pId').textContent = userId || 'Not logged in';
  document.getElementById('pBalance').textContent = '$' + balance.toFixed(2);
}

function showPage(p) {
  if ((p === 'buy' || p === 'profile') && !loggedIn) {
    document.getElementById('loginOverlay').classList.add('open');
    return;
  }
  document.getElementById('home-page').style.display = p === 'home' ? 'flex' : 'none';
  ['buy','customers','profile'].forEach(x => {
    document.getElementById(x + '-page').classList.toggle('active', x === p);
  });
  ['home','buy','customers','profile'].forEach(x => {
    const el = document.getElementById('nav-' + x);
    if (el) el.classList.toggle('active', x === p);
  });
}

// New: Direct to Purchase
function goToPurchase() {
  if (!loggedIn) {
    document.getElementById('loginOverlay').classList.add('open');
  } else {
    showPage('buy');
  }
}

function doDiscordLogin() {
  // Real Discord OAuth (you can keep or replace with a test user for dev)
  window.location.href = "https://discord.com/oauth2/authorize?client_id=1487896823350951947&response_type=code&redirect_uri=https%3A%2F%2Fatknotifier.netlify.app%2Fcallback&scope=identify%20email";
}

// Simulate successful login (for testing when callback isn't set up yet)
function simulateLogin(testUsername = "cuteeboy") {
  loggedIn = true;
  username = testUsername;
  userId = "123456789";
  saveState();
  updateUI();
  document.getElementById('loginOverlay').classList.remove('open');
  showToast('✅ Logged in as ' + username);
  showPage('buy'); // Go straight to buy after login
}

function logout() {
  if (confirm("Logout?")) {
    localStorage.clear();
    location.reload();
  }
}

// Handle callback from Discord (add this at the top of script)
if (window.location.pathname.includes('/callback') || window.location.search.includes('code=')) {
  // In real setup you would exchange the code for user data here
  // For now, simulate login with a nice username
  setTimeout(() => {
    simulateLogin("cute eboy"); // Change to your Discord name if you want
  }, 800);
}

// Rest of your functions (countdown, sliders, buySlot, renderSlots, etc.) stay the same
// Just make sure to call saveState() at the end of buySlot, redeemGift, etc.

function buySlot(plan, rate) {
  if (!loggedIn) {
    document.getElementById('loginOverlay').classList.add('open');
    return;
  }
  const slider = plan === 'Farmer' ? document.getElementById('fSlider') : document.getElementById('dSlider');
  const hrs = parseInt(slider.value);
  const cost = hrs * rate;

  const slots = plan === 'Farmer' ? farmerSlots : diamondSlots;
  const max = plan === 'Farmer' ? FM : DM;

  if (balance < cost) {
    showToast('❌ Insufficient balance — deposit first!');
    setTimeout(() => showPage('profile'), 1200);
    return;
  }
  if (slots.length >= max) {
    showToast('❌ All slots full!');
    return;
  }

  balance -= cost;
  slots.push({user: username, hrs});
  customers.push({user: username, plan, hours: hrs});

  const key = 'ATK-' + plan[0] + '-' + Math.random().toString(36).substring(2,10).toUpperCase();
  activeKey = {plan, key};

  addTx('Purchase', plan, cost, false);
  saveState();           // ← Important: persist purchase
  updateUI();
  renderSlots();
  renderCustomers();
  updateKey();

  showToast('✅ ' + plan + ' slot purchased! ' + hrs + 'h for $' + cost.toFixed(2));
}

// Add saveState() to redeemGift, addTx, etc. as well

// ... (keep all your other functions: renderSlots, updateKey, renderTx, renderCustomers, showToast, etc.)

// Initial load
updateUI();
renderSlots();
renderCustomers();
updateKey();
showPage('home');
</script>
</body>
</html>
